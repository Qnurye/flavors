# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "#0184bc" }

# Find
find_keyword  = { fg = "#cb7701", bold = true, italic = true, underline = true }
find_position = { fg = "#a626a4", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#50a14f", bg = "#50a14f" }
marker_cut      = { fg = "#e45649", bg = "#e45649" }
marker_marked   = { fg = "#0184bc", bg = "#0184bc" }
marker_selected = { fg = "#cb7701", bg = "#cb7701" }

# Count
count_copied   = { fg = "#fafafa", bg = "#50a14f" }
count_cut      = { fg = "#fafafa", bg = "#e45649" }
count_selected = { fg = "#fafafa", bg = "#cb7701" }

# Border
border_symbol = "│"
border_style  = { fg = "#9d9d9f" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#fafafa", bg = "#4078f2", bold = true }
inactive = { fg = "#4078f2", bg = "#eaeaeb" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#fafafa", bg = "#4078f2", bold = true }
normal_alt  = { fg = "#4078f2", bg = "#eaeaeb" }

# Select mode
select_main = { fg = "#fafafa", bg = "#0184bc", bold = true }
select_alt  = { fg = "#0184bc", bg = "#eaeaeb" }

# Unset mode
unset_main = { fg = "#fafafa", bg = "#b76b01", bold = true }
unset_alt  = { fg = "#b76b01", bg = "#eaeaeb" }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_sep   = { fg = "#9d9d9f" }
perm_type  = { fg = "#4078f2" }
perm_read  = { fg = "#cb7701" }
perm_write = { fg = "#e45649" }
perm_exec  = { fg = "#50a14f" }

# Progress
progress_label  = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#50a14f", bg = "#e5e5e6" }
progress_error  = { fg = "#cb7701", bg = "#e45649" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#4078f2" }
active   = { fg = "#a626a4", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#4078f2" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "#4078f2" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#4078f2" }
title   = {}
hovered = { fg = "#a626a4", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#eaeaeb" }
cand            = { fg = "#0184bc" }
rest            = { fg = "#696c77" }
desc            = { fg = "#a626a4" }
separator       = "  "
separator_style = { fg = "#dbdbdc" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#0184bc" }
run     = { fg = "#a626a4" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#eaeaeb", bg = "#383a42" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#4078f2" }
title    = { fg = "#4078f2" }
tbl_col  = { fg = "#0184bc" }
tbl_cell = { fg = "#a626a4", bg = "#e5e5e6" }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#50a14f" }
title_warn  = { fg = "#cb7701" }
title_error = { fg = "#e45649" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "#0184bc" },
	# Media
	{ mime = "{audio,video}/*", fg = "#cb7701" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#a626a4" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#50a14f" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#696c77" },
	# Fallback
	{ url = "*", fg = "#383a42" },
	{ url = "*/", fg = "#4078f2" },
]

# : }}}

[icon]

dirs = [
	{ name = ".config", text = "", fg = "#a626a4" },
	{ name = ".git", text = "", fg = "#0184bc" },
	{ name = ".github", text = "", fg = "#4078f2" },
	{ name = ".npm", text = "", fg = "#4078f2" },
	{ name = "Desktop", text = "", fg = "#0184bc" },
	{ name = "Development", text = "", fg = "#0184bc" },
	{ name = "Documents", text = "", fg = "#0184bc" },
	{ name = "Downloads", text = "", fg = "#0184bc" },
	{ name = "Library", text = "", fg = "#0184bc" },
	{ name = "Movies", text = "", fg = "#0184bc" },
	{ name = "Music", text = "", fg = "#0184bc" },
	{ name = "Pictures", text = "", fg = "#0184bc" },
	{ name = "Public", text = "", fg = "#0184bc" },
	{ name = "Videos", text = "", fg = "#0184bc" },
]
conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#383a42" },
	{ if = "link", text = "", fg = "#9d9d9f" },
	{ if = "block", text = "", fg = "#b76b01" },
	{ if = "char", text = "", fg = "#b76b01" },
	{ if = "fifo", text = "", fg = "#b76b01" },
	{ if = "sock", text = "", fg = "#b76b01" },
	{ if = "sticky", text = "", fg = "#b76b01" },
	{ if = "dummy", text = "", fg = "#e45649" },

	# Fallback
	{ if = "dir", text = "", fg = "#4078f2" },
	{ if = "exec", text = "", fg = "#50a14f" },
	{ if = "!dir", text = "", fg = "#383a42" },
]
